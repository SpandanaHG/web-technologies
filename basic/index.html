<html>
    <!-- This is the root tag. Inside this, all the content of the web page is present -->
    <head>
        <!-- This tag contains metadata that is sent to the browser, which is not displayed on the main page-->
    </head>
        <!-- This is the closing tag of the <head> -->
    <body>
        <!-- This contains all the content that is displayed on the main page -->
    </body>
        <!-- This is the closing tag of the <body> -->
</html>
    <!-- This is the closing tag of the <html-->
