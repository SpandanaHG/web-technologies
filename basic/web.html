<html>
    <head>
        HTML
    </head>
    <!--In the <head> tag, if it contains any content like 'HTML', the browser automatically moves it to the <body>, so it appears on the webpage -->
    <body>
        WELCOME
    </body>
    <!--  In the <body> tag, all the content like 'WELCOME' is displayed on the webpage -->
</html>
